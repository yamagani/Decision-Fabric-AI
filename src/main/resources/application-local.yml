spring:
  datasource:
    url: jdbc:tc:postgresql:15:///decisionfabric
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090
          jwk-set-uri: http://localhost:9090/.well-known/jwks.json

management:
  metrics:
    export:
      cloudwatch:
        enabled: false

ai:
  provider:
    config:
      ssm-parameter-path: /decision-fabric-ai-local/ai-provider
      poll-interval-seconds: 300

logging:
  level:
    com.decisionfabric: DEBUG
