spring:
  datasource:
    url: jdbc:tc:postgresql:15:///decisionfabric
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Use env vars so docker-compose.dev.yml can override these;
          # defaults here are correct for running the app directly on your dev machine
          # with `./run-local.sh --keycloak` or a manually started Keycloak on port 9090.
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9090/realms/decision-fabric-ai}
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:9090/realms/decision-fabric-ai/protocol/openid-connect/certs}

management:
  metrics:
    export:
      cloudwatch:
        enabled: false

ai:
  provider:
    config:
      ssm-parameter-path: /decision-fabric-ai-local/ai-provider
      poll-interval-seconds: 300

logging:
  level:
    com.decisionfabric: DEBUG
