services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: decisionfabric-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: decisionfabric
      POSTGRES_USER: decisionfabric
      POSTGRES_PASSWORD: decisionfabric
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisionfabric -d decisionfabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak (local OIDC / JWT issuer) ─────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: decisionfabric-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ── Decision Fabric AI application ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: decision-fabric-ai:local
    container_name: decisionfabric-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database — override application-local.yml Testcontainers values
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/decisionfabric
      SPRING_DATASOURCE_USERNAME: decisionfabric
      SPRING_DATASOURCE_PASSWORD: decisionfabric
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/decisionfabric
      DB_USERNAME: decisionfabric
      DB_PASSWORD: decisionfabric
      # JWT — override application-local.yml localhost values to use docker network
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9090/realms/decision-fabric-ai
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/decision-fabric-ai/protocol/openid-connect/certs
      JWT_ISSUER_URI: http://localhost:9090/realms/decision-fabric-ai
      JWT_JWKS_URI: http://keycloak:8080/realms/decision-fabric-ai/protocol/openid-connect/certs
      # Cache / misc
      RULE_CACHE_MAX_BYTES_MB: 200
      CLOUDWATCH_ENABLED: "false"
      DMN_ENGINE_PROVIDER: drools
      AI_CONFIG_SSM_PATH: /local/ai-provider
      SPRING_PROFILES_ACTIVE: local
      # JVM
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
