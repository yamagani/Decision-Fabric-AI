services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: decisionfabric-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: decisionfabric
      POSTGRES_USER: decisionfabric
      POSTGRES_PASSWORD: decisionfabric
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisionfabric -d decisionfabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Decision Fabric AI application ─────────────────────────────────────────
  # JWT / SSO configuration:
  #   Set JWT_ISSUER_URI and JWT_JWKS_URI to your organisation's OIDC provider.
  #   Set JWT_ROLES_CLAIM to the dot-path of the roles list in your JWT
  #   (default "roles" works for Okta, Azure AD, Auth0;
  #    use "realm_access.roles" for Keycloak — see docker-compose.dev.yml).
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: decision-fabric-ai:local
    container_name: decisionfabric-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/decisionfabric
      SPRING_DATASOURCE_USERNAME: decisionfabric
      SPRING_DATASOURCE_PASSWORD: decisionfabric
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/decisionfabric
      DB_USERNAME: decisionfabric
      DB_PASSWORD: decisionfabric
      # ── SSO / JWT ── replace these three with your provider's values ─────────
      JWT_ISSUER_URI: ${JWT_ISSUER_URI:-https://auth.example.com}
      JWT_JWKS_URI: ${JWT_JWKS_URI:-https://auth.example.com/.well-known/jwks.json}
      # Dot-path to the roles list inside your JWT.
      # "roles"                flat claim  — Okta, Azure AD, Auth0  (default)
      # "realm_access.roles"   nested      — add docker-compose.dev.yml for Keycloak
      JWT_ROLES_CLAIM: ${JWT_ROLES_CLAIM:-roles}
      # ────────────────────────────────────────────────────────────────────────
      # Cache / misc
      RULE_CACHE_MAX_BYTES_MB: 200
      CLOUDWATCH_ENABLED: "false"
      DMN_ENGINE_PROVIDER: drools
      AI_CONFIG_SSM_PATH: /local/ai-provider
      SPRING_PROFILES_ACTIVE: local
      # JVM
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
